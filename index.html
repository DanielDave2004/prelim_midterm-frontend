<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>MSEUF-CI Enrolled Students</title>
</head>
<body>
    <h1>MSEUF-CI Enrolled Students</h1>
    <div id="container" style="display: flex;">
        <div id="form" style="padding-right: 5rem; display: inline;">
            <label>Full Name</label>
            <input type="text" name="fullname" id="fName">

            <label>Course</label>
            <input type="text" name="course" id="cCourse">

            <label>Year Level</label>
            <select name="yearlevel" id="yLevel">
                <option value="" disabled selected>Select Year Level</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>

            <label>Email</label>
            <input type="text" name="email" id="eMail">
            
            <button id="add">Add Student</button>
        </div>
    <div>

    <table id="content">
    <thead>
        <tr>
            <th>Full Name</th>
            <th>Course</th>
            <th>Year Level</th>
            <th>Email</th>
            <th>Date Enrolled</th>
        </tr>
    </thead>
    <tbody id="tableBody">

    </tbody>
    </table>



    <script src="script.js"> </script>
</body>
</html>
